<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Collab</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#0f172a',
            surface: '#1e293b',
            primary: '#3b82f6',
            secondary: '#64748b',
            accent: '#8b5cf6',
          },
          fontFamily: {
            mono: ['Fira Code', 'monospace'],
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'slide-in-right': 'slideInRight 0.4s ease-in-out forwards',
            'slide-in-down': 'slideInDown 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-out-up': 'slideOutUp 0.25s cubic-bezier(0.7, 0, 0.84, 0) forwards',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            slideInRight: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(0)' },
            },
            slideInDown: {
              '0%': {
                opacity: '0',
                transform: 'translateY(-20px) scale(0.95)',
              },
              '50%': {
                opacity: '0.5',
              },
              '100%': {
                opacity: '1',
                transform: 'translateY(0) scale(1)',
              },
            },
            slideOutUp: {
              '0%': {
                opacity: '1',
                transform: 'translateY(0) scale(1)',
              },
              '50%': {
                opacity: '0.5',
              },
              '100%': {
                opacity: '0',
                transform: 'translateY(-20px) scale(0.95)',
              },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
